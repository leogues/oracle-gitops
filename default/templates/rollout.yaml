{{- if .Values.rollout.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "app.fullname" . }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "app.selectorLabels" . | nindent 6 }}
  template:
    {{- include "app.podTemplate" . | nindent 4 }}
  strategy:
    canary:
      {{- if .Values.rollout.trafficRouting.enabled }}
      stableService: {{ include "app.fullname" . }}-stable
      canaryService: {{ include "app.fullname" . }}-canary
      trafficRouting:
        plugins:
          argoproj-labs/gatewayAPI:
            httpRoute: {{ include "app.fullname" . }}
            namespace: {{ .Release.Namespace }}
            disableInProgressLabel: true
      {{- end }}
      steps:
        {{- toYaml .Values.rollout.canary.steps | nindent 8 }}
{{- end }}
