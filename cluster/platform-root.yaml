apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io/foreground
spec:
  project: platform
  source:
    repoURL: https://github.com/leogues/oracle-gitops.git
    targetRevision: main
    path: platform/_groups
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - Validate=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
