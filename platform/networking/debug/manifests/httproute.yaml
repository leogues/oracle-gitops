apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: echo
  namespace: debug
spec:
  parentRefs:
    - name: default
      namespace: gateway-system
      sectionName: https
  hostnames:
    - debug.leogues.com.br
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: echo
          port: 80
