apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: debug
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io/foreground
spec:
  project: platform
  destination:
    server: https://kubernetes.default.svc
    namespace: debug
  source:
    repoURL: https://github.com/leogues/oracle-gitops.git
    targetRevision: main
    path: platform/networking/debug/manifests
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
