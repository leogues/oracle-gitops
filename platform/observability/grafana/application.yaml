apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io/foreground
spec:
  project: platform
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: grafana
      targetRevision: 10.5.15
      helm:
        valueFiles:
          - $values/platform/observability/grafana/values.yaml
    - repoURL: https://github.com/leogues/oracle-gitops.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/leogues/oracle-gitops.git
      targetRevision: main
      path: platform/observability/grafana/extras
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
