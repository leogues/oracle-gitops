apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: music-hub-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io/background
spec:
  destination:
    namespace: production
    server: https://kubernetes.default.svc
  project: oracle-environments
  sources:
    - repoURL: https://github.com/leogues/oracle-gitops.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/leogues/oracle-gitops.git
      targetRevision: main
      path: default
      helm:
        valueFiles:
          - $values/envs/production/music-hub-app/values.yaml
  syncPolicy:
    automated:
      allowEmpty: false
      prune: true
      selfHeal: true
    syncOptions:
      - Validate=true
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
