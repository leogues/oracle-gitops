fullnameOverride: live-link-app
image:
  repository: leogues/video-chat-frontend
  tag: "53"
service:
  port: 5173
livenessProbe: null
readinessProbe: null
autoscaling:
  enabled: true
  maxReplicas: 2
httpRoute:
  enabled: true
  parentRefs:
  - name: default
    namespace: gateway-system
    sectionName: https
  hostnames:
  - live.leogues.com.br
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
